<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi primera página con Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>
<body>
  <main class="container mt-5">
  <h1>Bienvenido!</h1>
  <section role="region" aria-labelledby="contacto-titulo" class="card shadow-sm mb-4">
  <div class="card-body p-4 p-md-5">
  <h2 id="contacto-titulo" class="card-title h3 mb-4">Formulario de Contacto</h2>
  <form class="d-grid gap-3">
    <label for="nombre" class="form-label">Nombre:</label>
    <input type="text" class="form-control" id="nombre" name="nombre" required>

    <label for="email" class="form-label">Correo electrónico:</label>
    <input type="email" class="form-control" id="email" name="email" required>

    <label for="mensaje" class="form-label">Mensaje:</label>
    <textarea class="form-control" id="mensaje" name="mensaje"></textarea>

    <fieldset class="mt-3">
      <legend class="form-label d-block fs-6 mb-2">Soy:</legend>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="rol" id="alumno" value="alumno" required>
        <label class="form-check-label" for="alumno">Alumno</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="rol" id="docente" value="docente" required>
        <label class="form-check-label" for="docente">Docente</label>
      </div>
    </fieldset>
    
    <div class="form-check mt-3">
      <input class="form-check-input" type="checkbox" value="acepta" id="terminos" name="terminos" required>
      <label class="form-check-label" for="terminos">
        Acepto los términos y condiciones
      </label>
    </div>

    <button type="submit" class="btn btn-primary mb-4">Enviar <i class="bi bi-send"></i>
    </button>
  </form>

  <img src="https://www.ionos.com/es-us/digitalguide/fileadmin/_processed_/0/4/csm_e-mail-postfach-c_7b93fe176d.webp" alt="Imagen de correo electrónico">
    </div>
  </section>
</main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
